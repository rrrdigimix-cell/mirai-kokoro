<!DOCTYPE html>
<html lang="pt-br">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirai Kokoro</title>
</head>
<body style="margin:0; background:#FAF9F6; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px 16px; box-sizing:border-box;">
<div style="width:100%; max-width:380px; display:flex; flex-direction:column; align-items:center;">
  <img src="logo_v2.png" alt="Mirai Kokoro Project" style="width:54%; margin-bottom:24px;">
    <div style="width:100%; background:#FFFFFF; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(20,30,60,0.08); display:flex; flex-direction:column; gap:12px; box-sizing:border-box;">
      <div>
        <p style="font-size:11px; color:#79778E; margin:0 0 4px; font-weight:600;">E-MAIL</p>
        <input id="campo-email" type="email" placeholder="seu@email.com" style="width:100%; box-sizing:border-box; background:#F7F6F2; border:1px solid #E4E1D8; border-radius:9px; padding:10px 12px; font-size:13px;">
      </div>
      <div>
        <p style="font-size:11px; color:#79778E; margin:0 0 4px; font-weight:600;">SENHA</p>
        <input id="campo-senha" type="password" placeholder="••••••••" style="width:100%; box-sizing:border-box; background:#F7F6F2; border:1px solid #E4E1D8; border-radius:9px; padding:10px 12px; font-size:13px;">
      </div>
      <p id="mensagem-erro" style="font-size:12px; color:#B23A3A; text-align:center; margin:0; display:none;"></p>
      <div style="text-align:center;">
        <button id="botao-entrar" style="width:50%; margin-top:6px; height:44px; border-radius:9px; background:#1B2A4A; border:none; color:#FFFFFF; font-size:14px; font-weight:600; cursor:pointer;">ENTRAR</button>
      </div>
      <p id="link-esqueci-senha" style="font-size:11px; color:#8A8560; text-align:center; margin:4px 0 0; cursor:pointer; text-decoration:underline;">esqueci minha senha</p>
    </div>
    <div style="width:100%; border-top:1px solid #E4E1D8; margin-top:20px; padding-top:14px; text-align:center;">
      <p style="font-size:15px; font-weight:700; color:#1B2A4A; margin:0;">Thais Katayose</p>
      <p id="contato-info" style="font-size:10.5px; color:#79778E; margin:2px 0 0;">Carregando...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuUQi_s4v0Iat3FkzEfY06lX1NIaDAJ3Y",
      authDomain: "mirai-kokoro.firebaseapp.com",
      projectId: "mirai-kokoro",
      storageBucket: "mirai-kokoro.firebasestorage.app",
      messagingSenderId: "601277675162",
      appId: "1:601277675162:web:b2ab41cbb4709b008a9123"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const UID_ADMIN = "4jnMbmwV2JbSmKkzcJLBum7ybyK2";
    const UM_ANO_EM_MS = 365 * 24 * 60 * 60 * 1000;

    document.getElementById("botao-entrar").addEventListener("click", function () {
      const email = document.getElementById("campo-email").value;
      const senha = document.getElementById("campo-senha").value;
      const mensagemErro = document.getElementById("mensagem-erro");
      mensagemErro.style.display = "none";

      signInWithEmailAndPassword(auth, email, senha)
        .then(async function (resultado) {
          const uid = resultado.user.uid;

          // Administradora entra direto, sem checagem de prazo
          if (uid === UID_ADMIN) {
            window.location.href = "home.html";
            return;
          }

          const refCliente = doc(db, "clientes", uid);
          const snapCliente = await getDoc(refCliente);

          if (!snapCliente.exists()) {
            // Primeiro acesso deste cliente: grava a data de início
            await setDoc(refCliente, {
              email: email,
              primeiroAcesso: serverTimestamp()
            });
            window.location.href = "home.html";
          } else {
            const dados = snapCliente.data();
            if (dados.primeiroAcesso) {
              const dataInicio = dados.primeiroAcesso.toDate();
              const agora = new Date();
              const diferencaMs = agora.getTime() - dataInicio.getTime();

              if (diferencaMs > UM_ANO_EM_MS) {
                await signOut(auth);
                mensagemErro.textContent = "Seu acesso de 1 ano expirou. Entre em contato com a Thais para renovar.";
                mensagemErro.style.display = "block";
                return;
              }
            }
            window.location.href = "home.html";
          }
        })
        .catch(function () {
          mensagemErro.textContent = "E-mail ou senha incorretos.";
          mensagemErro.style.display = "block";
        });
    });

    document.getElementById("link-esqueci-senha").addEventListener("click", function () {
      const email = document.getElementById("campo-email").value;
      const mensagemErro = document.getElementById("mensagem-erro");
      mensagemErro.style.color = "#B23A3A";

      if (!email) {
        mensagemErro.textContent = "Digite seu e-mail no campo acima primeiro.";
        mensagemErro.style.display = "block";
        return;
      }

      sendPasswordResetEmail(auth, email)
        .then(function () {
          mensagemErro.style.color = "#4F7A6A";
          mensagemErro.textContent = "E-mail de recuperação enviado! Confira sua caixa de entrada.";
          mensagemErro.style.display = "block";
        })
        .catch(function () {
          mensagemErro.style.color = "#B23A3A";
          mensagemErro.textContent = "Não encontramos uma conta com esse e-mail.";
          mensagemErro.style.display = "block";
        });
    });
  </script>

</body>
</html>
