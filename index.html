<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirai Kokoro</title>
</head>
<body style="margin:0; background:#FAF9F6; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px 0;">

  <div style="width:300px; display:flex; flex-direction:column; align-items:center;">

    <img src="logo.png" alt="Mirai Kokoro Project" style="width:440px; max-width:90%; margin-bottom:24px;">

    <div style="width:100%; background:#FFFFFF; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(20,30,60,0.08); display:flex; flex-direction:column; gap:12px;">
      <div>
        <p style="font-size:11px; color:#79778E; margin:0 0 4px; font-weight:600;">E-MAIL</p>
        <input type="email" placeholder="seu@email.com" style="width:100%; box-sizing:border-box; background:#F7F6F2; border:1px solid #E4E1D8; border-radius:9px; padding:10px 12px; font-size:13px;">
      </div>
      <div>
        <p style="font-size:11px; color:#79778E; margin:0 0 4px; font-weight:600;">SENHA</p>
        <input type="password" placeholder="••••••••" style="width:100%; box-sizing:border-box; background:#F7F6F2; border:1px solid #E4E1D8; border-radius:9px; padding:10px 12px; font-size:13px;">
      </div>
      <a href="home.html" style="text-decoration:none;">
        <button style="width:100%; margin-top:6px; height:44px; border-radius:9px; background:#1B2A4A; border:none; color:#FFFFFF; font-size:14px; font-weight:600;">ENTRAR</button>
      </a>
      <p style="font-size:11px; color:#8A8560; text-align:center; margin:4px 0 0;">esqueci minha senha</p>
    </div>

    <div style="width:100%; border-top:1px solid #E4E1D8; margin-top:20px; padding-top:14px; text-align:center;">
      <p style="font-size:11px; font-weight:600; color:#1B2A4A; margin:0;">Thais Katayose</p>
      <p style="font-size:10.5px; color:#79778E; margin:2px 0 0;">contato@miraikokoro.com · (00) 00000-0000</p>
    </div>

  </div>

</body>
</html>
