<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mirai Kokoro - Respiração</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; display:flex; justify-content:center; background:#EDEBE4; }
  .app { width:100%; max-width:420px; min-height:100dvh; position:relative; }
  .fundo-foto { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; background-image:url('fundo-respiracao.png'); background-size:cover; background-position:center; }
  .camada-clareamento { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(250,249,246,0.28); z-index:1; }
  .conteudo { position:relative; z-index:2; display:flex; flex-direction:column; min-height:100dvh; padding:20px 18px 10px; }
  .voltar { display:flex; align-items:center; gap:10px; margin-bottom:8px; width:100%; cursor:pointer; text-decoration:none; }
  .titulo-pagina { font-family:'Playfair Display',serif; font-weight:700; font-size:21px; color:#1B2A4A; margin:0;
    text-shadow: 0 1px 4px rgba(255,255,255,0.9), 0 0 10px rgba(255,255,255,0.7); }
  .abas-tecnica { display:flex; gap:6px; margin-bottom:20px; width:100%; }
  .aba-tecnica { flex:1; text-align:center; padding:8px 4px; border-radius:9px; font-size:11px; font-weight:600; cursor:pointer; color:#8A8560; background:rgba(240,238,230,0.92); }
  .aba-tecnica.ativa { background:#1B2A4A; color:#FFFFFF; }
  .palco { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; }
  .aro-espera-container { width:230px; height:230px; position:relative; display:flex; align-items:center; justify-content:center; }
  .anel-espera { position:absolute; top:0; left:0; width:100%; height:100%; transform:rotate(-90deg); opacity:0; }
  .anel-espera circle { fill:none; stroke:#FFFFFF; stroke-width:4; stroke-linecap:round; }
  .circulo-fixo { width:210px; height:210px; border-radius:50%; border:3px solid #BEE3F5; position:relative; overflow:hidden;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 0 0 5px #BEE3F5, 0 8px 20px rgba(20,30,45,0.18);
    background:rgba(255,255,255,0.25); }
.balao-fixo { position:absolute; top:0; left:0; width:100%; height:100%;
    background-image: linear-gradient(rgba(255,255,255,0.78), rgba(255,255,255,0.78)), url('fundo-respiracao.png');
    background-attachment: scroll, fixed;
    background-size: cover, cover;
    background-position: center, center;
    clip-path: circle(8px at 50% 50%);
  }
  .ponteiro-wrapper { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; transform:rotate(0deg); pointer-events:none; z-index:3; }
  .ponteiro-bolinha { position:absolute; top:50%; left:50%; width:36px; height:36px; margin-top:-18px; margin-left:-18px;
    transform: translateY(-105px); border-radius:50%;
    background:#FFFFFF; border:4px solid #BEE3F5; box-shadow:0 0 0 2px rgba(255,255,255,0.9), 0 2px 6px rgba(20,30,45,0.3); }
  .numero { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%); font-size:42px; font-weight:600; color:#17171A; font-family:'Playfair Display',serif;
    text-shadow: 0 0 8px #FFFFFF, 0 0 12px #FFFFFF, 0 0 18px #FFFFFF, 0 0 4px #FFFFFF; z-index:4; }
  .fase-texto { position:absolute; top:67%; left:50%; transform:translate(-50%,-50%); font-size:13px; color:#1B2A4A; font-weight:600; letter-spacing:0.4px;
    background:rgba(255,255,255,0.65); padding:2px 13px; border-radius:9px; z-index:4; white-space:nowrap; }
  .ciclos-texto { font-size:12px; color:#2E2B22; margin-top:16px; font-weight:600; background:rgba(255,255,255,0.6); padding:3px 12px; border-radius:8px; }
  .cronometro { font-size:20px; color:#1B2A4A; margin-top:10px; font-family:'Playfair Display',serif; font-weight:700; background:rgba(255,255,255,0.6); padding:2px 14px; border-radius:10px; }
  .controles { display:flex; gap:10px; margin-top:22px; }
  .botao-controle { border:none; border-radius:22px; padding:11px 20px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .botao-principal { background:#1B2A4A; color:#fff; }
  .botao-secundario { background:rgba(255,255,255,0.92); color:#1B2A4A; border:1px solid #D8D4C8; }
  .nav-inferior { width:100%; display:flex; justify-content:space-around; border-top:1px solid rgba(228,225,216,0.8); margin-top:20px; padding-top:14px;
    padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px)); background:rgba(255,255,255,0.55); border-radius:14px 14px 0 0; }
</style>
</head>
<body>

<div class="app">
  <div class="fundo-foto"></div>
  <div class="camada-clareamento"></div>

  <div class="conteudo">

    <a href="home.html" class="voltar">
      <i class="ti ti-arrow-left" style="color:#1B2A4A;"></i>
      <p class="titulo-pagina">Respiração guiada</p>
    </a>

    <div class="abas-tecnica" id="abas-tecnica"></div>

    <div class="palco">
      <div class="aro-espera-container">
        <svg class="anel-espera" id="anel-espera" viewBox="0 0 230 230">
          <circle cx="115" cy="115" r="107"></circle>
        </svg>
        <div class="circulo-fixo">
          <div class="balao-fixo" id="balao-fixo"></div>
          <span class="numero" id="numero">4</span>
          <p class="fase-texto" id="fase-texto">toque em iniciar</p>
        </div>
        <div class="ponteiro-wrapper" id="ponteiro-wrapper">
          <div class="ponteiro-bolinha"></div>
        </div>
      </div>

      <p class="ciclos-texto" id="ciclos-texto">ciclos: 0</p>
      <p class="cronometro" id="cronometro">00:00</p>

      <div class="controles">
        <button class="botao-controle botao-secundario" onclick="reiniciar()"><i class="ti ti-refresh" style="font-size:15px;"></i> Reiniciar</button>
        <button class="botao-controle botao-principal" id="botao-iniciar" onclick="alternar()"><i class="ti ti-player-play" style="font-size:15px;"></i> Iniciar</button>
      </div>
    </div>

    <div class="nav-inferior">
      <a href="home.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:2px;">
        <i class="ti ti-home" style="font-size:20px; color:#C9C5B8;"></i>
        <span style="font-size:10px; color:#8A8560;">início</span>
      </a>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
        <i class="ti ti-bell" style="font-size:20px; color:#C9C5B8;"></i>
        <span style="font-size:10px; color:#8A8560;">avisos</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
        <i class="ti ti-user" style="font-size:20px; color:#C9C5B8;"></i>
        <span style="font-size:10px; color:#8A8560;">perfil</span>
      </div>
      <div id="botao-sair" style="display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer;">
        <i class="ti ti-logout" style="font-size:20px; color:#B23A3A;"></i>
        <span style="font-size:10px; color:#B23A3A;">sair</span>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCuUQi_s4v0Iat3FkzEfY06lX1NIaDAJ3Y",
    authDomain: "mirai-kokoro.firebaseapp.com",
    projectId: "mirai-kokoro",
    storageBucket: "mirai-kokoro.firebasestorage.app",
    messagingSenderId: "601277675162",
    appId: "1:601277675162:web:b2ab41cbb4709b008a9123"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const TECNICAS_PADRAO = {
    "478": { nomeExibicao: "4-7-8", fases: [ {nome:"Inspire", tipo:"inspirar", segundos:4}, {nome:"Segure", tipo:"manter", segundos:7}, {nome:"Expire", tipo:"expirar", segundos:8} ] },
    "box": { nomeExibicao: "Quadrada 4-4-4-4", fases: [ {nome:"Inspire", tipo:"inspirar", segundos:4}, {nome:"Segure", tipo:"manter", segundos:4}, {nome:"Expire", tipo:"expirar", segundos:4}, {nome:"Segure", tipo:"manter", segundos:4} ] },
    "calma": { nomeExibicao: "Calma 4-6", fases: [ {nome:"Inspire", tipo:"inspirar", segundos:4}, {nome:"Expire", tipo:"expirar", segundos:6} ] }
  };

  const RAIO_INFLAR = 112;
  const RAIO_ESVAZIAR = 8;
  const RAIO_ANEL = 107;
  const CIRCUNFERENCIA = 2 * Math.PI * RAIO_ANEL;

  const anelEspera = document.getElementById("anel-espera");
  const circuloAnel = anelEspera.querySelector("circle");
  circuloAnel.style.strokeDasharray = CIRCUNFERENCIA;
  circuloAnel.style.strokeDashoffset = CIRCUNFERENCIA;

  const ponteiroWrapper = document.getElementById("ponteiro-wrapper");
  const balaoFixo = document.getElementById("balao-fixo");
  const numero = document.getElementById("numero");
  const faseTexto = document.getElementById("fase-texto");

  let tecnicas = {};
  let tecnicaAtual = "478";
  let rodando = false;
  let faseIniciada = false;
  let timeoutAtivo = null;
  let intervaloContagem = null;
  let intervaloCronometro = null;
  let segundosTotais = 0;
  let ciclosCompletos = 0;
  let indiceFaseAtual = 0;

  let passoAtualObj = null;
  let restanteSegundos = 0;
  let duracaoRestanteMs = 0;
  let inicioFaseMs = 0;

  function construirFasesComRaio(fasesConfig) {
    let raioAnterior = RAIO_ESVAZIAR;
    return fasesConfig.map(f => {
      let raio;
      if (f.tipo === "inspirar") raio = RAIO_INFLAR;
      else if (f.tipo === "expirar") raio = RAIO_ESVAZIAR;
      else raio = raioAnterior;
      raioAnterior = raio;
      return { nome: f.nome, seg: f.segundos, raio: raio, tipo: f.tipo };
    });
  }

  async function carregarConfiguracoes() {
    for (const id of Object.keys(TECNICAS_PADRAO)) {
      try {
        const snap = await getDoc(doc(db, "respiracao_config", id));
        const dados = snap.exists() ? snap.data() : TECNICAS_PADRAO[id];
        tecnicas[id] = { nomeExibicao: dados.nomeExibicao, fases: construirFasesComRaio(dados.fases) };
      } catch (e) {
        tecnicas[id] = { nomeExibicao: TECNICAS_PADRAO[id].nomeExibicao, fases: construirFasesComRaio(TECNICAS_PADRAO[id].fases) };
      }
    }
    montarAbas();
    resetarEstadoVisual();
  }

  function montarAbas() {
    const container = document.getElementById("abas-tecnica");
    container.innerHTML = "";
    Object.keys(tecnicas).forEach((id, i) => {
      const div = document.createElement("div");
      div.className = "aba-tecnica" + (i === 0 ? " ativa" : "");
      div.textContent = tecnicas[id].nomeExibicao;
      div.onclick = () => selecionarTecnica(id, div);
      container.appendChild(div);
    });
  }

  function formatarCronometro(seg) {
    const m = Math.floor(seg / 60).toString().padStart(2, "0");
    const s = (seg % 60).toString().padStart(2, "0");
    return m + ":" + s;
  }

  function selecionarTecnica(id, elemento) {
    if (rodando || faseIniciada) pararTudo();
    tecnicaAtual = id;
    document.querySelectorAll(".aba-tecnica").forEach(a => a.classList.remove("ativa"));
    elemento.classList.add("ativa");
    resetarEstadoVisual();
  }

  function resetarEstadoVisual() {
    faseTexto.textContent = "toque em iniciar";
    numero.textContent = tecnicas[tecnicaAtual].fases[0].seg;
    balaoFixo.style.transition = "none";
    balaoFixo.style.clipPath = "circle(1px at 50% 50%)";
    esconderAnel();
    esconderPonteiro();
  }

  function esconderAnel() {
    anelEspera.style.transition = "none";
    anelEspera.style.opacity = "0";
    circuloAnel.style.transition = "none";
    circuloAnel.style.strokeDashoffset = CIRCUNFERENCIA;
  }

  function esconderPonteiro() {
    ponteiroWrapper.style.transition = "none";
    ponteiroWrapper.style.opacity = "0";
    ponteiroWrapper.style.transform = "rotate(0deg)";
  }

  function obterAnguloRotacao(el) {
    const transformStr = getComputedStyle(el).transform;
    if (transformStr === "none") return 0;
    const match = transformStr.match(/matrix\(([^)]+)\)/);
    if (!match) return 0;
    const partes = match[1].split(",").map(Number);
    const a = partes[0], b = partes[1];
    let angulo = Math.round(Math.atan2(b, a) * (180 / Math.PI));
    if (angulo < 0) angulo += 360;
    return angulo;
  }

  function congelarAnimacoes() {
    const clipAtual = getComputedStyle(balaoFixo).clipPath;
    balaoFixo.style.transition = "none";
    balaoFixo.style.clipPath = clipAtual;

    if (passoAtualObj && passoAtualObj.tipo === "manter") {
      const dashAtual = getComputedStyle(circuloAnel).strokeDashoffset;
      circuloAnel.style.transition = "none";
      circuloAnel.style.strokeDashoffset = dashAtual;

      const anguloAtual = obterAnguloRotacao(ponteiroWrapper);
      ponteiroWrapper.style.transition = "none";
      ponteiroWrapper.style.transform = "rotate(" + anguloAtual + "deg)";
    }
  }

  function pararTudo() {
    rodando = false;
    faseIniciada = false;
    clearTimeout(timeoutAtivo);
    clearInterval(intervaloContagem);
    clearInterval(intervaloCronometro);
    document.getElementById("botao-iniciar").innerHTML = '<i class="ti ti-player-play" style="font-size:15px;"></i> Iniciar';
  }

  window.reiniciar = function () {
    pararTudo();
    segundosTotais = 0;
    ciclosCompletos = 0;
    indiceFaseAtual = 0;
    passoAtualObj = null;
    restanteSegundos = 0;
    duracaoRestanteMs = 0;
    document.getElementById("cronometro").textContent = "00:00";
    document.getElementById("ciclos-texto").textContent = "ciclos: 0";
    resetarEstadoVisual();
  };

  window.alternar = function () {
    if (rodando) {
      rodando = false;
      const decorrido = Date.now() - inicioFaseMs;
      duracaoRestanteMs = Math.max(0, duracaoRestanteMs - decorrido);
      congelarAnimacoes();
      clearTimeout(timeoutAtivo);
      clearInterval(intervaloContagem);
      clearInterval(intervaloCronometro);
      document.getElementById("botao-iniciar").innerHTML = '<i class="ti ti-player-play" style="font-size:15px;"></i> Iniciar';
    } else {
      rodando = true;
      document.getElementById("botao-iniciar").innerHTML = '<i class="ti ti-player-pause" style="font-size:15px;"></i> Pausar';
      intervaloCronometro = setInterval(() => {
        segundosTotais++;
        document.getElementById("cronometro").textContent = formatarCronometro(segundosTotais);
      }, 1000);

      if (faseIniciada) {
        executarFase(indiceFaseAtual, true);
      } else {
        faseIniciada = true;
        executarFase(0, false);
      }
    }
  };

  function executarFase(indice, retomando) {
    if (!rodando) return;
    const passos = tecnicas[tecnicaAtual].fases;

    if (!retomando) {
      if (indice > 0 && indice % passos.length === 0) {
        ciclosCompletos++;
        document.getElementById("ciclos-texto").textContent = "ciclos: " + ciclosCompletos;
      }
      indiceFaseAtual = indice;
      passoAtualObj = passos[indice % passos.length];
      duracaoRestanteMs = passoAtualObj.seg * 1000;
      restanteSegundos = passoAtualObj.seg;
    }

    const passo = passoAtualObj;
    const duracaoSeg = duracaoRestanteMs / 1000;

    faseTexto.textContent = passo.nome;
    numero.textContent = restanteSegundos;

    balaoFixo.style.transition = "clip-path " + duracaoSeg + "s linear";
    void balaoFixo.offsetHeight;
    balaoFixo.style.clipPath = "circle(" + passo.raio + "px at 50% 50%)";

    if (passo.tipo === "manter") {
      if (!retomando) {
        anelEspera.style.transition = "none";
        anelEspera.style.opacity = "1";
        circuloAnel.style.transition = "none";
        circuloAnel.style.strokeDashoffset = CIRCUNFERENCIA;
        void circuloAnel.getBoundingClientRect();

        ponteiroWrapper.style.transition = "none";
        ponteiroWrapper.style.opacity = "1";
        ponteiroWrapper.style.transform = "rotate(0deg)";
        void ponteiroWrapper.offsetHeight;
      }
      circuloAnel.style.transition = "stroke-dashoffset " + duracaoSeg + "s linear";
      circuloAnel.style.strokeDashoffset = 0;

      ponteiroWrapper.style.transition = "transform " + duracaoSeg + "s linear";
      ponteiroWrapper.style.transform = "rotate(360deg)";
    } else {
      esconderAnel();
      esconderPonteiro();
    }

    inicioFaseMs = Date.now();

    clearInterval(intervaloContagem);
    intervaloContagem = setInterval(() => {
      restanteSegundos--;
      if (restanteSegundos > 0) numero.textContent = restanteSegundos;
    }, 1000);

    clearTimeout(timeoutAtivo);
    timeoutAtivo = setTimeout(() => {
      executarFase(indiceFaseAtual + 1, false);
    }, duracaoRestanteMs);
  }

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
    } else {
      carregarConfiguracoes();
    }
  });

  document.getElementById("botao-sair").addEventListener("click", function () {
    signOut(auth).then(function () { window.location.href = "index.html"; });
  });
</script>

</body>
</html>
