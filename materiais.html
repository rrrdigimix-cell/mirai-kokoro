<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirai Kokoro - Materiais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body style="margin:0; background:#FAF9F6; font-family:'Inter',sans-serif; display:flex; justify-content:center; padding:24px 16px; box-sizing:border-box; min-height:100vh;">

  <div style="width:100%; max-width:380px; display:flex; flex-direction:column;">

    <a href="home.html" style="text-decoration:none; display:flex; align-items:center; gap:10px; margin-bottom:20px;">
      <i class="ti ti-arrow-left" style="font-size:19px; color:#1B2A4A;"></i>
      <p style="font-family:'Playfair Display',serif; font-weight:700; font-size:19px; color:#1B2A4A; margin:0;">Materiais</p>
    </a>

    <div id="lista-materiais" style="display:flex; flex-direction:column; gap:12px;">

      <div style="background:#FFFFFF; border-radius:14px; padding:14px; box-shadow:0 3px 10px rgba(27,42,74,0.06); display:flex; align-items:center; gap:12px; opacity:0.7; box-sizing:border-box;">
        <div style="min-width:38px; height:38px; border-radius:50%; background:#E9E7DE; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-file-text" style="font-size:17px; color:#B8B4A6;"></i>
        </div>
        <div style="flex:1;">
          <p style="font-size:13.5px; font-weight:600; color:#3A3A3A; margin:0;">Material 1 — em breve</p>
          <p style="font-size:11px; color:#918D7E; margin:2px 0 0;">aguardando conteúdo da Thais</p>
        </div>
      </div>

      <div style="background:#FFFFFF; border-radius:14px; padding:14px; box-shadow:0 3px 10px rgba(27,42,74,0.06); display:flex; align-items:center; gap:12px; opacity:0.7; box-sizing:border-box;">
        <div style="min-width:38px; height:38px; border-radius:50%; background:#E9E7DE; display:flex; align-items:center; justify-content:center;">
          <i class="ti ti-file-text" style="font-size:17px; color:#B8B4A6;"></i>
        </div>
        <div style="flex:1;">
          <p style="font-size:13.5px; font-weight:600; color:#3A3A3A; margin:0;">Material 2 — em breve</p>
          <p style="font-size:11px; color:#918D7E; margin:2px 0 0;">aguardando conteúdo da Thais</p>
        </div>
      </div>

      <div style="border:1.5px dashed #D8D4C8; border-radius:14px; padding:16px; text-align:center; box-sizing:border-box;">
        <i class="ti ti-plus" style="font-size:16px; color:#B8B4A6;"></i>
        <p style="font-size:11.5px; color:#918D7E; margin:4px 0 0;">novos materiais aparecerão aqui</p>
      </div>

    </div>

    <div style="width:100%; display:flex; justify-content:space-around; border-top:1px solid #E4E1D8; margin-top:28px; padding-top:14px;">
      <a href="home.html" style="text-decoration:none; display:flex; flex-direction:column; align-items:center; gap:2px;">
        <i class="ti ti-home" style="font-size:20px; color:#C9C5B8;"></i>
        <span style="font-size:10px; color:#8A8560;">início</span>
      </a>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
        <i class="ti ti-bell" style="font-size:20px; color:#C9C5B8;"></i>
        <span style="font-size:10px; color:#8A8560;">avisos</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
        <i class="ti ti-user" style="font-size:20px; color:#C9C5B8;"></i>
        <span style="font-size:10px; color:#8A8560;">perfil</span>
      </div>
    </div>

  </div>

</body>
</html>
